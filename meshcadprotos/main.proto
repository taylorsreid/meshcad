syntax = "proto3";

// Go package name
option go_package = "../meshcadprotos";

import "user.proto";
import "incident.proto";
import "incidentevent.proto";
import "read.proto";

message MeshcadChunk {
    uint32 id = 1;
    uint32 numerator = 2;
    uint32 denominator = 3;
    bytes payload = 4;
}

message Response {
    uint32 status = 1; // HTTP status code
    optional string payload = 2; // id for create, JSON for read, nil for update, or detailed error message on failure
}

message Payload {
    uint32 timestamp = 1;
    oneof payload {
        Response response = 2;
        CreateUser createUser = 3;
        CreateIncident createIncident = 4;
        CreateIncidentEvent createIncidentEvent = 5;
        Read read = 6;
        UpdateUser updateUser = 7;
        UpdateIncident updateIncident = 8;
        UpdateIncidentEvent updateIncidentEvent = 9;
        // no delete yet, but we can add it later if needed
    }
}
syntax = "proto3";

// Go package name
option go_package = "../emradiprotos";

import "user.proto";
import "incident.proto";
import "incidentevent.proto";
import "read.proto";

message EmradiChunk {
    uint32 id = 1;
    uint32 numerator = 2;
    uint32 denominator = 3;
    bytes payload = 4;
}

message Response {
    uint32 status = 1; // HTTP status code
    optional string payload = 2; // id for create, JSON for read, nil for update, or detailed error message on failure
}

message Payload {
    oneof payload {
        Response response = 1;
        CreateUser createUser = 2;
        CreateIncident createIncident = 3;
        CreateIncidentEvent createIncidentEvent = 4;
        Read read = 5;
        UpdateUser updateUser = 6;
        UpdateIncident updateIncident = 7;
        UpdateIncidentEvent updateIncidentEvent = 8;
        // no delete yet, but we can add it later if needed
    }
}
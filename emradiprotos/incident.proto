syntax = "proto3";

// Go package name
option go_package = "../emradiprotos";

message CreateIncident {
    optional uint32 id = 1;
    string incidentType = 2;
    optional double latitude = 3;
    optional double longitude = 4;
    optional string address = 5;
    string createdBy = 6;
}

message UpdateIncident {
    uint32 id = 1;
    optional string incidentType = 2;
    optional double latitude = 3;
    optional double longitude = 4;
    optional string address = 5;
    optional uint64 closedAt = 6;
}
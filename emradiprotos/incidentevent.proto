syntax = "proto3";

// Go package name
option go_package = "../emradiprotos";

message CreateIncidentEvent {
    uint32 id = 1;
    string title = 2;
    optional string details = 3;
    string createdBy = 4;
    repeated uint32 affectedUsers = 5;
}

message UpdateIncidentEvent {
    uint32 id = 1;
    optional string title = 2;
    optional string details = 3;
    string createdBy = 4;
    repeated uint32 affectedUsers = 5;
}
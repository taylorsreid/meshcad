syntax = "proto3";

// Go package name
option go_package = "../emradiprotos";

message CreateIncidentEvent {
    optional uint32 id = 1;
    string title = 2;
    optional string details = 3;
    optional string createdBy = 4;
    optional uint32 affectedUser = 5;
}

message UpdateIncidentEvent {
    uint32 id = 1;
    optional string title = 2;
    optional string details = 3;
    optional string createdBy = 4;
    optional uint32 affectedUser = 5;
}